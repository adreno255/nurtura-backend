asyncapi: 3.0.0
#region Info
info:
    title: Nurtura MQTT Service API
    version: 1.0.0
    description: |
        MQTT-based communication protocol for Nurtura IoT-based smart indoor urban farming system.
        This service handles bidirectional communication between ESP32 devices and the backend server.

        **Architecture:**
        - Transport Layer: MQTT broker (HiveMQ Cloud or local Mosquitto)
        - Protocol: MQTT v3.1.1
        - QoS: 1 (At least once delivery)
        - Retain: false (real-time data only)

        **Message Flow:**
        1. ESP32 devices publish sensor data, status, and errors
        2. Backend receives and processes messages via MqttService
        3. Backend publishes commands to control devices
        4. Automation rules trigger commands based on sensor data

    tags:
        - name: ESP32
          description: Messages published by ESP32 devices
        - name: Backend
          description: Messages published by backend server
        - name: Sensors
          description: Environmental sensor data
        - name: Commands
          description: Device control commands
        - name: Status
          description: Device health and connectivity

    contact:
        name: LoamTech Solutions
        url: https://nurturaloam.tech
        email: lots.loamtechsolutions@gmail.com
#endregion

#region Servers
servers:
    production:
        host: 7f8fd0f6e09646648c23332ffca10732.s1.eu.hivemq.cloud:8883
        protocol: mqtts
        description: Production MQTT broker (TLS)
        security:
            - $ref: '#/components/securitySchemes/mqttAuth'
        tags:
            - name: production
              description: Production environment

    staging:
        host: e99410967d634f9987b63d2bca209fb6.s1.eu.hivemq.cloud:8883
        protocol: mqtts
        description: Staging MQTT broker (TLS)
        security:
            - $ref: '#/components/securitySchemes/mqttAuth'
        tags:
            - name: staging
              description: Staging environment

    development/test:
        host: localhost:1883
        protocol: mqtt
        description: Development MQTT broker (no TLS)
        tags:
            - name: development
              description: Local development
            - name: test
              description: Local testing

defaultContentType: application/json
#endregion

#region Channels
channels:
    sensorData:
        address: 'Topic: nurtura/rack/{macAddress}/sensors'
        title: Sensor Data Channel
        description: Real-time sensor readings from ESP32 devices
        messages:
            sensorReading:
                $ref: '#/components/messages/SensorDataMessage'
        parameters:
            macAddress:
                $ref: '#/components/parameters/MacAddress'
        bindings:
            mqtt:
                qos: 1
                retain: false

    deviceStatus:
        address: 'Topic: nurtura/rack/{macAddress}/status'
        title: Device Status Channel
        description: Device health and connectivity status
        messages:
            statusUpdate:
                $ref: '#/components/messages/DeviceStatusMessage'
        parameters:
            macAddress:
                $ref: '#/components/parameters/MacAddress'
        bindings:
            mqtt:
                qos: 1
                retain: true

    deviceErrors:
        address: 'Topic: nurtura/rack/{macAddress}/errors'
        title: Device Errors Channel
        description: |
            Device error and warning messages from ESP32 hardware components.

            **Error Categories:**
            - **Sensor Errors**: I2C communication failures, timeouts, out-of-range readings
            - **Pump Errors**: Motor failures, no water supply, pressure issues
            - **Light Errors**: Circuit failures, power delivery issues

            **Severity Levels:**
            - **CRITICAL**: Immediate user notification and automation pause required
            - **HIGH**: Device function impaired, user notification recommended
            - **MEDIUM**: Performance degraded, monitoring required
            - **LOW**: Informational, no immediate action needed

            **Recovery Codes**: Devices report recovery when errors are resolved (e.g., SENSOR_RECOVERED).

            Error messages include timestamp, hardware type, attempt counts, and diagnostic data for troubleshooting.
        messages:
            errorReport:
                $ref: '#/components/messages/DeviceErrorMessage'
        parameters:
            macAddress:
                $ref: '#/components/parameters/MacAddress'
        bindings:
            mqtt:
                qos: 1
                retain: false

    wateringCommands:
        address: 'Topic: nurtura/rack/{macAddress}/commands/watering'
        title: Watering Commands Channel
        description: Commands to control water pump
        messages:
            wateringCommand:
                $ref: '#/components/messages/WateringCommandMessage'
        parameters:
            macAddress:
                $ref: '#/components/parameters/MacAddress'
        bindings:
            mqtt:
                qos: 1
                retain: false

    lightingCommands:
        address: 'Topic: nurtura/rack/{macAddress}/commands/lighting'
        title: Lighting Commands Channel
        description: Commands to control grow lights
        messages:
            lightingCommand:
                $ref: '#/components/messages/LightingCommandMessage'
        parameters:
            macAddress:
                $ref: '#/components/parameters/MacAddress'
        bindings:
            mqtt:
                qos: 1
                retain: false

    sensorCommands:
        address: 'Topic: nurtura/rack/{macAddress}/commands/sensors'
        title: Sensor Commands Channel
        description: Commands to control sensor data streaming
        messages:
            sensorCommand:
                $ref: '#/components/messages/SensorCommandMessage'
        parameters:
            macAddress:
                $ref: '#/components/parameters/MacAddress'
        bindings:
            mqtt:
                qos: 1
                retain: false

    backendStatus:
        address: 'Topic: nurtura/backend/status'
        title: Backend Status Channel
        description: Backend service status and connectivity (connection/disconnection notifications using MQTT Last Will and Testament)
        messages:
            backendStatus:
                $ref: '#/components/messages/BackendStatusMessage'
        bindings:
            mqtt:
                qos: 1
                retain: true
#endregion

#region Operations
operations:
    receiveSensorData:
        action: receive
        channel:
            $ref: '#/channels/sensorData'
        summary: Receive sensor data from ESP32 device
        description: |
            Backend subscribes to sensor data published by ESP32 devices.
            Data is processed by SensorsService and stored in the database.
            Automation rules are evaluated after each sensor reading.
        traits:
            - $ref: '#/components/operationTraits/mqtt'
        messages:
            - $ref: '#/channels/sensorData/messages/sensorReading'

    receiveDeviceStatus:
        action: receive
        channel:
            $ref: '#/channels/deviceStatus'
        summary: Receive device status updates
        description: |
            Backend subscribes to status updates to track device health.
            Status updates trigger device online/offline events and notifications.
        traits:
            - $ref: '#/components/operationTraits/mqtt'
        messages:
            - $ref: '#/channels/deviceStatus/messages/statusUpdate'

    receiveDeviceErrors:
        action: receive
        channel:
            $ref: '#/channels/deviceErrors'
        summary: Receive device error reports
        description: |
            Backend subscribes to error messages for real-time hardware monitoring and diagnostics.

            **Processing Rules:**
            - CRITICAL errors: Trigger immediate user notification, pause automation, and log alerts
            - HIGH errors: Log with monitoring flag, schedule troubleshooting workflow
            - MEDIUM/LOW errors: Store in error history, alert user if threshold exceeded
            - RECOVERY codes: Mark corresponding error as resolved, resume automation if applicable

            **Error Tracking:**
            - Correlate errors with timestamp, hardware type, and device MAC
            - Track attempt counts for intermittent failures (e.g., flaky I2C communication)
            - Store last successful read timestamp to calculate downtime
            - Preserve diagnostic data for troubleshooting and firmware improvements

            **Automation Impact:**
            - Critical sensor/pump errors auto-pause or disable related automations
            - Recovery messages re-enable automations after confirmation
            - Users can manually override automation state via API
        traits:
            - $ref: '#/components/operationTraits/mqtt'
        messages:
            - $ref: '#/channels/deviceErrors/messages/errorReport'

    sendWateringCommand:
        action: send
        channel:
            $ref: '#/channels/wateringCommands'
        summary: Send watering control commands to device
        description: |
            Backend publishes commands to control the water pump.
            Commands can be triggered by users or automation rules.
        traits:
            - $ref: '#/components/operationTraits/mqtt'
        messages:
            - $ref: '#/channels/wateringCommands/messages/wateringCommand'

    sendLightingCommand:
        action: send
        channel:
            $ref: '#/channels/lightingCommands'
        summary: Send lighting control commands to device
        description: |
            Backend publishes commands to control grow lights.
            Commands can be triggered by users or automation rules.
        traits:
            - $ref: '#/components/operationTraits/mqtt'
        messages:
            - $ref: '#/channels/lightingCommands/messages/lightingCommand'

    sendSensorCommand:
        action: send
        channel:
            $ref: '#/channels/sensorCommands'
        summary: Send sensor data streaming control commands to device
        description: |
            Backend publishes commands to start or stop sensor data streaming.
            Triggered when racks are registered/activated or deleted/archived.
            Prevents wasted MQTT messages from inactive devices.
        traits:
            - $ref: '#/components/operationTraits/mqtt'
        messages:
            - $ref: '#/channels/sensorCommands/messages/sensorCommand'

    publishBackendStatus:
        action: send
        channel:
            $ref: '#/channels/backendStatus'
        summary: Publish backend service status
        description: |
            Backend publishes its online/offline status.
            Devices use this to know if the backend is available.
            Automatically published on connection, graceful shutdown, and as MQTT Last Will (LWT).
            LWT ensures devices receive offline notification even on unexpected backend crashes.
        traits:
            - $ref: '#/components/operationTraits/mqtt'
        messages:
            - $ref: '#/channels/backendStatus/messages/backendStatus'
#endregion

components:
    #region Messages
    messages:
        SensorDataMessage:
            name: SensorData
            title: Sensor Data
            summary: Environmental sensor readings
            contentType: application/json
            tags:
                - name: ESP32
                  description: Published by ESP32 device
            payload:
                $ref: '#/components/schemas/SensorDataPayload'
            examples:
                - name: normalReading
                  summary: Normal sensor reading
                  payload:
                      t: 25.5
                      h: 65.2
                      m: 45.8
                      l: 850
                      tm: '2025-02-05T14:30:00.000Z'
                - name: automationEventReading
                  summary: Sensor reading when automation rule is triggered
                  payload:
                      t: 25.5
                      h: 65.2
                      m: 45.8
                      l: 850
                      wu: 50
                      tm: '2025-02-05T14:30:00.000Z'

        DeviceStatusMessage:
            name: DeviceStatus
            title: Device Status
            summary: Device health and connectivity information
            contentType: application/json
            tags:
                - name: ESP32
                  description: Published by ESP32 device
            payload:
                $ref: '#/components/schemas/DeviceStatusPayload'
            examples:
                - name: onlineStatus
                  summary: Device online with metrics
                  payload:
                      o: true
                      tm: '2025-02-05T14:30:00.000Z'
                      v: '1.0.3'
                      ip: '192.168.1.100'
                      mac: 'AA:BB:CC:DD:EE:FF'
                      u: 3600000

        DeviceErrorMessage:
            name: DeviceError
            title: Device Error
            summary: Error or recovery report from device
            contentType: application/json
            tags:
                - name: ESP32
                  description: Published by ESP32 device
            payload:
                $ref: '#/components/schemas/DeviceErrorPayload'
            examples:
                - name: sensorFailure
                  summary: Critical sensor communication failure
                  payload:
                      c: 'SENSOR_FAILURE'
                      m: 'BME280 sensor not responding'
                      s: 'CRITICAL'
                      tm: '2025-02-05T14:31:30.000Z'
                      ht: 'TEMPERATURE'
                      d:
                          ac: 3
                          lsr: 1707111600000
                          ed: 'I2C communication timeout after 100ms'
                - name: pumpWarning
                  summary: Pump warning - low pressure
                  payload:
                      c: 'PUMP_TIMEOUT'
                      m: 'Water pump responds slowly to start command'
                      s: 'MEDIUM'
                      tm: '2025-02-05T14:32:15.000Z'
                      ht: 'WATER_PUMP'
                      d:
                          ac: 1
                          lsr: 1707112335000
                - name: sensorRecovered
                  summary: Sensor recovered after failure
                  payload:
                      c: 'SENSOR_RECOVERED'
                      m: 'Temperature sensor responding normally'
                      s: 'LOW'
                      tm: '2025-02-05T14:33:45.000Z'
                      ht: 'TEMPERATURE'
                - name: lightFailure
                  summary: Grow light circuit failure
                  payload:
                      c: 'LIGHT_FAILURE'
                      m: 'Grow light PWM control circuit failure detected'
                      s: 'HIGH'
                      tm: '2025-02-05T14:34:00.000Z'
                      ht: 'GROW_LIGHT'
                      d:
                          ed: 'GPIO pin 32 not responding to PWM signals'

        WateringCommandMessage:
            name: WateringCommand
            title: Watering Command
            summary: Command to control water pump
            contentType: application/json
            tags:
                - name: Backend
                  description: Published by backend server
            payload:
                $ref: '#/components/schemas/WateringCommandPayload'
            examples:
                - name: startWatering
                  summary: Start watering
                  payload:
                      action: 'watering_start'
                - name: stopWatering
                  summary: Stop watering immediately
                  payload:
                      action: 'watering_stop'

        LightingCommandMessage:
            name: LightingCommand
            title: Lighting Command
            summary: Command to control grow lights
            contentType: application/json
            tags:
                - name: Backend
                  description: Published by backend server
            payload:
                $ref: '#/components/schemas/LightingCommandPayload'
            examples:
                - name: turnOn
                  summary: Turn lights on
                  payload:
                      action: 'light_on'
                - name: turnOff
                  summary: Turn lights off
                  payload:
                      action: 'light_off'

        SensorCommandMessage:
            name: SensorCommand
            title: Sensor Command
            summary: Command to control sensor data streaming
            contentType: application/json
            tags:
                - name: Backend
                  description: Published by backend server
                - name: Sensors
                  description: Sensor data control
            payload:
                $ref: '#/components/schemas/SensorCommandPayload'
            examples:
                - name: startSensor
                  summary: Start sensor data streaming
                  payload:
                      action: 'sensor_start'
                - name: stopSensor
                  summary: Stop sensor data streaming
                  payload:
                      action: 'sensor_stop'

        BackendStatusMessage:
            name: BackendStatus
            title: Backend Status
            summary: Backend service status update
            contentType: application/json
            tags:
                - name: Backend
                  description: Published by backend server
                - name: Status
                  description: Service connectivity status
            payload:
                $ref: '#/components/schemas/BackendStatusPayload'
            examples:
                - name: onlineStatus
                  summary: Backend service online
                  payload:
                      o: true
                      tm: '2025-02-05T14:30:00.000Z'
                - name: offlineStatus
                  summary: Backend service offline (LWT)
                  payload:
                      o: false
                      tm: '2025-02-05T14:35:00.000Z'
    #endregion

    #region Schemas
    schemas:
        SensorDataPayload:
            type: object
            required:
                - t
                - h
                - m
                - l
            properties:
                t:
                    type: number
                    description: Temperature in Celsius
                    minimum: -50
                    maximum: 100
                    example: 25.5
                h:
                    type: number
                    description: Humidity percentage
                    minimum: 0
                    maximum: 100
                    example: 65.2
                m:
                    type: number
                    description: Soil moisture percentage
                    minimum: 0
                    maximum: 100
                    example: 45.8
                l:
                    type: number
                    description: Light level in lux or raw LDR value
                    minimum: 0
                    example: 850
                wu:
                    type: number
                    description: Amount of water used in milliliters (optional, included when watering occurs)
                    minimum: 0
                    example: 50
                tm:
                    type: string
                    format: date-time
                    description: Timestamp of the reading (ISO 8601)
                    example: '2025-02-05T14:30:00.000Z'

        DeviceStatusPayload:
            type: object
            required:
                - o
            properties:
                o:
                    type: boolean
                    description: Whether the device is online
                    example: true
                tm:
                    type: string
                    format: date-time
                    description: Timestamp of the status update (ISO 8601)
                    example: '2025-02-05T14:30:00.000Z'
                v:
                    type: string
                    description: Current firmware version of the device
                    example: '1.0.3'
                ip:
                    type: string
                    description: Current IP address of the device
                    example: '192.168.1.100'
                mac:
                    type: string
                    description: MAC address of the device
                    example: 'AA:BB:CC:DD:EE:FF'
                u:
                    type: integer
                    description: Uptime in milliseconds
                    minimum: 0
                    example: 3600000

        DeviceErrorPayload:
            type: object
            required:
                - c
                - m
                - s
            properties:
                c:
                    type: string
                    enum:
                        - SENSOR_FAILURE
                        - SENSOR_TIMEOUT
                        - SENSOR_NOT_FOUND
                        - SENSOR_OUT_OF_RANGE
                        - PUMP_FAILURE
                        - PUMP_TIMEOUT
                        - PUMP_NO_WATER
                        - PUMP_FALSE_START
                        - LIGHT_FAILURE
                        - UNKNOWN_ERROR
                        - SENSOR_RECOVERED
                        - PUMP_RECOVERED
                        - LIGHT_RECOVERED
                        - UNKNOWN_RECOVERY
                    description: |
                        Error or recovery code. Error codes indicate device malfunction; 
                        recovery codes indicate error resolution.
                    example: 'SENSOR_FAILURE'
                m:
                    type: string
                    description: Human-readable error message describing the issue or recovery
                    minLength: 1
                    maxLength: 255
                    example: 'BME280 sensor not responding'
                s:
                    type: string
                    enum:
                        - LOW
                        - MEDIUM
                        - HIGH
                        - CRITICAL
                    description: |
                        Severity level indicating impact to device functionality.
                        - CRITICAL: Device function completely impaired, immediate action required
                        - HIGH: Device function partially impaired, monitoring required
                        - MEDIUM: Performance degraded but functional, investigation recommended
                        - LOW: Informational or recovered state, no immediate action needed
                    example: 'CRITICAL'
                tm:
                    type: string
                    format: date-time
                    description: ISO 8601 timestamp when error occurred or was resolved (UTC)
                    example: '2025-02-05T14:31:30.000Z'
                ht:
                    type: string
                    enum:
                        - TEMPERATURE
                        - HUMIDITY
                        - MOISTURE
                        - LIGHT
                        - GROW_LIGHT
                        - WATER_PUMP
                    description: |
                        Hardware component type involved in the error.
                        Optional but recommended for better error categorization and diagnostics.
                    example: 'TEMPERATURE'
                d:
                    type: object
                    description: Additional diagnostic details about the error
                    additionalProperties: false
                    properties:
                        ac:
                            type: integer
                            description: Number of retry attempts before reporting error
                            minimum: 0
                            example: 3
                        lsr:
                            type: number
                            description: |
                                Timestamp of last successful operation (milliseconds since epoch).
                                Helps calculate downtime duration.
                            example: 1707111600000
                        ed:
                            type: string
                            description: |
                                Raw error data, diagnostic information, or stack trace for troubleshooting.
                                Useful for debugging intermittent issues and firmware improvements.
                            maxLength: 512
                            example: 'I2C communication timeout after 100ms'

        WateringCommandPayload:
            type: object
            required:
                - action
            properties:
                action:
                    type: string
                    enum:
                        - watering_start
                        - watering_stop
                    description: Action to perform
                    example: 'watering_start'

        LightingCommandPayload:
            type: object
            required:
                - action
            properties:
                action:
                    type: string
                    enum:
                        - 'light_on'
                        - 'light_off'
                    description: Action to perform
                    example: 'light_on'

        SensorCommandPayload:
            type: object
            required:
                - action
            properties:
                action:
                    type: string
                    enum:
                        - sensor_start
                        - sensor_stop
                    description: Sensor data streaming action
                    example: 'sensor_start'

        BackendStatusPayload:
            type: object
            required:
                - o
                - tm
            properties:
                o:
                    type: boolean
                    description: Whether the backend is online
                    example: true
                tm:
                    type: string
                    format: date-time
                    description: Timestamp of the status update (ISO 8601)
                    example: '2025-02-05T14:30:00.000Z'
    #endregion

    #region Parameters
    parameters:
        MacAddress:
            description: |
                ESP32 device MAC address (unique identifier).
                Format: 6 pairs of hexadecimal digits separated by colons.
    #endregion
    #region Security Schemes
    securitySchemes:
        mqttAuth:
            type: userPassword
            description: MQTT username and password authentication
    #endregion

    #region Operation Traits
    operationTraits:
        mqtt:
            bindings:
                mqtt:
                    qos: 1
                    retain: false
    #endregion
